<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Схема відділення</title>

<style>
body {
    font-family: Arial;
    background-color: #f5f5f5;
}

h1 {
    text-align: center;
}

.floor {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin: 20px;
}

.corridor {
    grid-column: 1 / 6;
    text-align: center;
    font-weight: bold;
    padding: 15px;
    background: #ddd;
}

.room {
    border: 2px solid black;
    padding: 10px;
    background: white;
}

.room-title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}

.beds {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.bed {
    height: 40px;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background-color: lightgreen;
    font-weight: bold;
}

.occupied {
    background-color: lightcoral;
}
</style>
</head>
<body>

<h1>Схема відділення</h1>

<div class="floor">

<!-- Верхній ряд палат -->
<div class="room" id="room1"></div>
<div class="room" id="room2"></div>
<div class="room" id="room3"></div>
<div class="room" id="room4"></div>
<div class="room" id="room5"></div>

<div class="corridor">КОРИДОР</div>

<!-- Нижній ряд палат -->
<div class="room" id="room6"></div>
<div class="room" id="room7"></div>
<div class="room" id="room8"></div>
<div class="room" id="room9"></div>
<div class="room" id="room10"></div>

</div>

<script>
function createRoom(roomNumber) {
    let room = document.getElementById("room" + roomNumber);

    let title = document.createElement("div");
    title.className = "room-title";
    title.innerText = "Палата " + roomNumber;
    room.appendChild(title);

    let bedsContainer = document.createElement("div");
    bedsContainer.className = "beds";

    for (let i = 1; i <= 4; i++) {
        let bed = document.createElement("div");
        bed.className = "bed";
        bed.innerText = i;
        bed.dataset.id = roomNumber + "-" + i;
        bed.onclick = function() {
            bed.classList.toggle("occupied");
            saveState();
        };
        bedsContainer.appendChild(bed);
    }

    room.appendChild(bedsContainer);
}

function saveState() {
    let beds = document.querySelectorAll(".bed");
    let states = {};
    beds.forEach(bed => {
        states[bed.dataset.id] = bed.classList.contains("occupied");
    });
    localStorage.setItem("hospitalState", JSON.stringify(states));
}

function loadState() {
    let states = JSON.parse(localStorage.getItem("hospitalState"));
    if (!states) return;

    let beds = document.querySelectorAll(".bed");
    beds.forEach(bed => {
        if (states[bed.dataset.id]) {
            bed.classList.add("occupied");
        }
    });
}

for (let i = 1; i <= 10; i++) {
    createRoom(i);
}

window.onload = loadState;
</script>

</body>
</html>
