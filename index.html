<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Схема божевільної чайної вечірки</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:0; }
h1 { text-align:center; margin:20px 0; }
.legend { text-align:center; margin-bottom:20px; }
.legend span { display:inline-block; width:20px; height:20px; margin-right:5px; border:1px solid #000; vertical-align:middle; }
.hospital-block { border:2px solid #888; border-radius:8px; padding:10px; margin:15px 0; background:#eee; }
.floor { display:flex; flex-direction:column; align-items:center; gap:15px; }
.ward-row { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; }
.room { border:2px solid #555; padding:10px; background:#fff; border-radius:6px; display:flex; flex-direction:column; gap:5px; min-width:100px; max-width:130px; box-sizing:border-box; }
.room-title { text-align:center; font-weight:bold; }
.beds { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.bed { height:35px; border:2px solid #000; display:flex; align-items:center; justify-content:center; cursor:pointer; background:lightgreen; font-weight:bold; border-radius:4px; }
.occupied { background:lightcoral; }
.corridor { width:100%; max-width:800px; text-align:center; padding:10px 0; background:#ccc; border-radius:6px; font-weight:bold; margin:5px 0; }
@media(max-width:600px){.bed{height:30px;font-size:13px}.room{padding:8px;min-width:80px;max-width:100px}.corridor{font-size:13px;padding:8px 0}}
</style>
</head>
<body>

<h1>Схема божевільної чайної вечірки</h1>
<div class="legend">
  <span style="background:lightgreen;"></span> Вільно &nbsp;&nbsp;&nbsp;
  <span style="background:lightcoral;"></span> Зайнято
</div>

<div id="hospital"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCiLZaoin-oSJ6IFGefSkctV4WW4YcnKlE",
  authDomain: "mad-tea-party-997ab.firebaseapp.com",
  databaseURL: "https://mad-tea-party-997ab-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "mad-tea-party-997ab",
  storageBucket: "mad-tea-party-997ab.appspot.com",
  messagingSenderId: "607063415201",
  appId: "1:607063415201:web:b2f8b4e27cc861c6cb93e0"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const corridors = ['Хірургія','Травма','Терапія','Невро'];
const hospitalDiv = document.getElementById('hospital');
const beds = [];

// Створюємо кожен блок (коридор)
corridors.forEach((corrName, blockIndex)=>{
  const blockDiv = document.createElement('div');
  blockDiv.className='hospital-block';

  const floor = document.createElement('div'); floor.className='floor';

  // Верхній ряд палат (1-5)
  const topRow = document.createElement('div'); topRow.className='ward-row';
  for(let i=1;i<=5;i++){
    const roomNum=i;
    const room=createRoomDiv(blockIndex, roomNum);
    topRow.appendChild(room);
  }
  floor.appendChild(topRow);

  // Коридор
  const corridorDiv = document.createElement('div'); corridorDiv.className='corridor';
  corridorDiv.innerText=corrName;
  floor.appendChild(corridorDiv);

  // Нижній ряд палат (6-10)
  const bottomRow = document.createElement('div'); bottomRow.className='ward-row';
  for(let i=6;i<=10;i++){
    const roomNum=i;
    const room=createRoomDiv(blockIndex, roomNum);
    bottomRow.appendChild(room);
  }
  floor.appendChild(bottomRow);

  blockDiv.appendChild(floor);
  hospitalDiv.appendChild(blockDiv);
});

// Створення кімнати
function createRoomDiv(blockIndex, roomNum){
  const room=document.createElement('div'); room.className='room';
  const title=document.createElement('div'); title.className='room-title';
  title.innerText='Палата '+roomNum;
  const bedsDiv=document.createElement('div'); bedsDiv.className='beds';

  for(let b=1;b<=4;b++){
    const bed=document.createElement('div'); bed.className='bed';
    bed.innerText=b;

    // Унікальний ID для Firebase: блок + палата + ліжко
    const bedId = `b${blockIndex}-r${roomNum}-l${b}`;
    bed.dataset.id = bedId;
    beds.push(bedId);

    bed.onclick = ()=>db.ref('beds/'+bedId).transaction(c=>c==='occupied'?'free':'occupied');
    bedsDiv.appendChild(bed);
  }

  room.appendChild(title);
  room.appendChild(bedsDiv);
  return room;
}

// Ініціалізація бази
db.ref('beds').once('value').then(snapshot=>{
  if(!snapshot.exists()){
    const initial={};
    beds.forEach(b=>initial[b]='free');
    db.ref('beds').set(initial);
  }
});

// Підписка на зміни
db.ref('beds').on('value', snapshot=>{
  const data = snapshot.val()||{};
  document.querySelectorAll('.bed').forEach(b=>{
    b.classList.toggle('occupied', data[b.dataset.id]==='occupied');
  });
});
</script>
</body>
</html>
