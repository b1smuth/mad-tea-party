<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Хірургічне відділення</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#eaf4ff,#f7fbff);
  margin:0;
  padding:0;
  color:#1f2d3d;
}

h1 {
  text-align:center;
  margin:25px 0 10px;
  font-weight:700;
  color:#0b5ed7;
}

.subtitle {
  text-align:center;
  margin-bottom:20px;
  color:#6c757d;
  font-size:14px;
}

/* Легенда */
.legend {
  text-align:center;
  margin-bottom:15px;
  font-weight:600;
}

.legend span {
  display:inline-block;
  width:18px;
  height:18px;
  margin-right:6px;
  border-radius:4px;
  vertical-align:middle;
}

/* Статистика */
.stats {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.stat-box {
  background:#ffffff;
  padding:14px 20px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(13,110,253,0.08);
  text-align:center;
  min-width:160px;
  border:1px solid #e3f0ff;
}

.stat-box span {
  display:block;
  font-size:24px;
  font-weight:700;
  margin-top:5px;
}

#occupiedCount { color:#dc3545; }
#freeCount { color:#198754; }
#totalCount { color:#0d6efd; }

/* Блок палат */
.hospital-block {
  border-radius:18px;
  padding:25px;
  margin:20px auto 40px;
  background:#ffffff;
  max-width:1150px;
  box-shadow:0 10px 30px rgba(13,110,253,0.08);
}

/* Головна зміна: палатами по ширині контейнера */
.ward-row {
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  justify-content:center;
}

/* Палата */
.room {
  background:#f8fbff;
  border:1px solid #dbeafe;
  border-radius:16px;
  padding:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  min-width:160px;
  transition:0.2s;
}

.room:hover {
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(13,110,253,0.12);
}

.room-title {
  font-weight:600;
  color:#0d6efd;
  font-size:15px;
}

/* Ліжка */
.beds {
  display: grid;
  grid-auto-flow: column;           /* заповнення по колонках */
  grid-template-rows: repeat(5, 42px); /* максимум 5 ліжок у стовпчику */
  gap: 10px;
  justify-content: center;
}

.bed {
  height:42px;
  width:42px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:600;
  border:2px solid #b6d4fe;
  background:#d1e7dd;
  color:#155724;
  transition:0.2s;
}

.bed:hover {
  transform:scale(1.08);
}

.occupied {
  background:#f8d7da;
  border-color:#f1aeb5;
  color:#842029;
}

@media(max-width:900px){
  .beds {
    grid-auto-flow: row;
    grid-template-rows: none;
    grid-template-columns: repeat(auto-fit, minmax(42px, 1fr));
  }
}

@media(max-width:600px){
  .bed{height:36px;width:36px;font-size:13px}
}

/* Модальне */
#confirmModal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(13,110,253,0.2);
  backdrop-filter: blur(4px);
}

#confirmModal .modal-content {
  background:#ffffff;
  padding:28px;
  border-radius:18px;
  text-align:center;
  max-width:320px;
  width:90%;
  box-shadow:0 10px 30px rgba(13,110,253,0.2);
}

#confirmModal p {
  margin-bottom:22px;
  font-weight:600;
}

#confirmModal button {
  padding:9px 20px;
  margin:0 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.ok-btn { background:#198754; color:white; }
.cancel-btn { background:#dc3545; color:white; }
</style>
</head>

<body>

<h1>🏥 Хірургічне відділення</h1>
<div class="subtitle">Моніторинг зайнятості ліжок у реальному часі</div>

<div class="legend">
  <span style="background:#d1e7dd;"></span> Вільно
  &nbsp;&nbsp;&nbsp;
  <span style="background:#f8d7da;"></span> Зайнято
</div>

<div class="stats">
  <div class="stat-box">Всього місць <span id="totalCount">0</span></div>
  <div class="stat-box">Зайнятих <span id="occupiedCount">0</span></div>
  <div class="stat-box">Вільних <span id="freeCount">0</span></div>
</div>

<div class="hospital-block">
  <div class="ward-row" id="wards"></div>
</div>

<div id="confirmModal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button class="ok-btn">Так</button>
    <button class="cancel-btn">Ні</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCiLZaoin-oSJ6IFGefSkctV4WW4YcnKlE",
  authDomain: "mad-tea-party-997ab.firebaseapp.com",
  databaseURL: "https://mad-tea-party-997ab-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "mad-tea-party-997ab",
  storageBucket: "mad-tea-party-997ab.appspot.com",
  messagingSenderId: "607063415201",
  appId: "1:607063415201:web:b2f8b4e27cc861c6cb93e0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const wardStructure = {
  1:5, 2:3, 3:5, 4:3, 5:3,
  8:2, 9:8, 10:5, 11:3
};

const wardsDiv = document.getElementById('wards');
const bedsList = [];

const modal = document.getElementById('confirmModal');
const modalText = document.getElementById('modalText');
const okBtn = modal.querySelector('.ok-btn');
const cancelBtn = modal.querySelector('.cancel-btn');

let currentBedId = null;

// Створення палат і ліжок
Object.entries(wardStructure).forEach(([roomNum, bedCount])=>{
  const room = document.createElement('div');
  room.className='room';

  const title = document.createElement('div');
  title.className='room-title';
  title.innerText='Палата '+roomNum;

  const bedsDiv = document.createElement('div');
  bedsDiv.className='beds';

  for(let i=1;i<=bedCount;i++){
    const bed = document.createElement('div');
    bed.className='bed';
    bed.innerText=i;

    const bedId=`r${roomNum}-l${i}`;
    bed.dataset.id=bedId;
    bedsList.push(bedId);

    bed.onclick=()=>{
      const isOccupied = bed.classList.contains('occupied');
      const newState = isOccupied ? 'Вільно' : 'Зайняте';
      currentBedId = bedId;
      modalText.innerText = `Змінити ліжко №${i} в палаті ${roomNum} на ${newState}?`;
      modal.style.display='flex';
    };

    bedsDiv.appendChild(bed);
  }

  room.appendChild(title);
  room.appendChild(bedsDiv);
  wardsDiv.appendChild(room);
});

// Ініціалізація Firebase, якщо бази ще нема
db.ref('beds').once('value', snapshot => {
  if (!snapshot.exists()) {
    const initialData = {};
    bedsList.forEach(id => initialData[id] = 'free');
    db.ref('beds').set(initialData);
  }
});

// Відображення стану ліжок
db.ref('beds').on('value', snapshot=>{
  const data=snapshot.val()||{};
  let total=0, occupied=0;

  document.querySelectorAll('.bed').forEach(b=>{
    const state = data[b.dataset.id];
    total++;
    if(state==='occupied') occupied++;
    b.classList.toggle('occupied', state==='occupied');
  });

  document.getElementById('totalCount').innerText = total;
  document.getElementById('occupiedCount').innerText = occupied;
  document.getElementById('freeCount').innerText = total - occupied;
});

// Зміна стану ліжка через модалку
okBtn.onclick=()=>{
  if(currentBedId)
    db.ref('beds/'+currentBedId).transaction(c=>c==='occupied'?'free':'occupied');
  modal.style.display='none';
};

cancelBtn.onclick=()=> modal.style.display='none';
</script>

</body>
</html>
