<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Хірургія</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f4f8; margin:0; padding:0; color:#333; }
h1 { text-align:center; margin:20px 0; color:#333; }

.legend, .stats { text-align:center; margin-bottom:15px; font-weight:bold; }

.legend span { display:inline-block; width:20px; height:20px; margin-right:5px; border:1px solid #333; vertical-align:middle; }

.stats {
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  font-size:16px;
}

.stat-box {
  background:#ffffff;
  padding:8px 15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.hospital-block { border:2px solid #ccc; border-radius:8px; padding:15px; margin:20px auto; background:#e8e6e3; max-width:1000px; }
.ward-row { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; }

.room { border:2px solid #b0b0b0; padding:10px; background:#fff; border-radius:6px; display:flex; flex-direction:column; gap:5px; min-width:110px; }
.room-title { text-align:center; font-weight:bold; }

.beds { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }

.bed { height:35px; border:2px solid #999; display:flex; align-items:center; justify-content:center; cursor:pointer; background:#a8d5ba; font-weight:bold; border-radius:4px; transition:0.2s; }
.occupied { background:#f5a38a; }

@media(max-width:600px){.bed{height:30px;font-size:13px}.room{min-width:90px}}

/* Модальне */
#confirmModal {
  position: fixed; top:0; left:0; width:100%; height:100%; display:none;
  align-items:center; justify-content:center; background: rgba(0,0,0,0.5); z-index:1000;
}
#confirmModal .modal-content {
  background:#fff; padding:20px 25px; border-radius:10px; text-align:center;
  max-width:300px; width:90%; box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
#confirmModal p { margin-bottom:20px; font-weight:bold; }
#confirmModal button {
  padding:8px 16px; margin:0 10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;
}
#confirmModal .ok-btn { background:#a8d5ba; }
#confirmModal .cancel-btn { background:#f5a38a; }
</style>
</head>
<body>

<h1>Хірургія</h1>

<div class="legend">
  <span style="background:#a8d5ba;"></span> Вільно &nbsp;&nbsp;&nbsp;
  <span style="background:#f5a38a;"></span> Зайнято
</div>

<!-- 🔢 Лічильник -->
<div class="stats">
  <div class="stat-box">Всього місць: <span id="totalCount">0</span></div>
  <div class="stat-box">Зайнятих: <span id="occupiedCount">0</span></div>
  <div class="stat-box">Вільних: <span id="freeCount">0</span></div>
</div>

<div class="hospital-block">
  <div class="ward-row" id="wards"></div>
</div>

<div id="confirmModal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button class="ok-btn">Так</button>
    <button class="cancel-btn">Ні</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "mad-tea-party-997ab.firebaseapp.com",
  databaseURL: "https://mad-tea-party-997ab-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "mad-tea-party-997ab",
  storageBucket: "mad-tea-party-997ab.appspot.com",
  messagingSenderId: "607063415201",
  appId: "1:607063415201:web:b2f8b4e27cc861c6cb93e0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const wardStructure = {
  1:5, 2:3, 3:5, 4:3, 5:3,
  8:2, 9:8, 10:5, 11:3
};

const wardsDiv = document.getElementById('wards');
const bedsList = [];

const modal = document.getElementById('confirmModal');
const modalText = document.getElementById('modalText');
const okBtn = modal.querySelector('.ok-btn');
const cancelBtn = modal.querySelector('.cancel-btn');

let currentBedId = null;

Object.entries(wardStructure).forEach(([roomNum, bedCount])=>{
  const room = document.createElement('div');
  room.className='room';

  const title = document.createElement('div');
  title.className='room-title';
  title.innerText='Палата '+roomNum;

  const bedsDiv = document.createElement('div');
  bedsDiv.className='beds';

  for(let i=1;i<=bedCount;i++){
    const bed = document.createElement('div');
    bed.className='bed';
    bed.innerText=i;

    const bedId=`r${roomNum}-l${i}`;
    bed.dataset.id=bedId;
    bedsList.push(bedId);

    bed.onclick=()=>{
      const isOccupied = bed.classList.contains('occupied');
      const newState = isOccupied ? 'Вільно' : 'Зайняте';
      currentBedId = bedId;
      modalText.innerText = `Змінити Ліжко №${i} в Палаті ${roomNum} на ${newState}?`;
      modal.style.display='flex';
    };

    bedsDiv.appendChild(bed);
  }

  room.appendChild(title);
  room.appendChild(bedsDiv);
  wardsDiv.appendChild(room);
});

// 🔥 Перезапис структури
const initialData = {};
bedsList.forEach(id=>initialData[id]='free');
db.ref('beds').set(initialData);

// 🔄 Підписка + оновлення статистики
db.ref('beds').on('value', snapshot=>{
  const data=snapshot.val()||{};
  let total=0, occupied=0;

  document.querySelectorAll('.bed').forEach(b=>{
    const state = data[b.dataset.id];
    total++;
    if(state==='occupied') occupied++;
    b.classList.toggle('occupied', state==='occupied');
  });

  document.getElementById('totalCount').innerText = total;
  document.getElementById('occupiedCount').innerText = occupied;
  document.getElementById('freeCount').innerText = total - occupied;
});

okBtn.onclick=()=>{
  if(currentBedId)
    db.ref('beds/'+currentBedId).transaction(c=>c==='occupied'?'free':'occupied');
  modal.style.display='none';
};

cancelBtn.onclick=()=> modal.style.display='none';
</script>
</body>
</html>
